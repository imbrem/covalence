[package]
name = "covalence-web-kernel"
version = "0.0.0"
edition = "2024"

# The browser front-end for the kernel: a wasm-bindgen `cdylib` over
# `covalence-kernel::service::KernelService`. JS stays an executor — all
# proof-checking logic is this Rust crate compiled to `wasm32-unknown-unknown`.
# See `notes/web-kernel.md`.

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
covalence-kernel = { path = "../covalence-kernel", features = ["serde"] }
serde_json = "1"
# Pinned to the installed `wasm-bindgen-cli` (the crate and CLI versions must
# match exactly).
wasm-bindgen = "=0.2.117"
console_error_panic_hook = "0.1"
