[package]
name = "covalence-core"
version = "0.0.0"
edition = "2024"

# TCB. Pure LF + HOL primitives + reduction rules folded together.
# Keep dependencies minimal so the import graph is auditable in one
# glance. Hashing, S-expression syntax, FFI bridges, and the
# (untrusted) HOL builder shell live downstream in `covalence-hol`.

[dependencies]
covalence-pure = { path = "../../base" }
# The audited core-on-pure seam (toHOL slice): `CoreLang` extends `Builtins`,
# so the enumerable native-computation CanonRules back the IsThm accelerator
# rules. This edge IS a TCB-shape change (docs/deps/tcb.json gains
# covalence-pure-eval) — maintainer-review territory.
covalence-pure-eval = { path = "../../base/eval" }
covalence-types = { path = "../../../lib/types" }
covalence-sexp = { path = "../../../lib/sexp" }
fnv = "1"
indexmap = "2"
smol_str = "0.3"
thiserror = "2"
