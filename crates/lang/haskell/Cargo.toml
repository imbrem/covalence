[package]
name = "covalence-haskell"
version = "0.0.0"
edition = "2024"

# A kernel-agnostic surface crate: a hand-written recursive-descent parser for a
# small Haskell EXPRESSION dialect plus top-level function definitions, and a
# PLUGGABLE `Lower` trait through which a backend realizes that AST into its own
# target. The point is that a backend overrides only the subset it lowers (e.g.
# a different numeric-literal strategy), so this on-ramp can grow toward writing
# `init/` in a Haskell dialect without committing to one lowering. Depends on no
# logic and no external crate — the parser is hand-rolled.
#
# Deferred work: crates/lang/haskell/SKELETONS.md.

[dependencies]
# The covalence arbitrary-precision `Nat` (the type of Haskell nat literals
# and S-expression nat atoms). Kernel-independent: wraps num-bigint only.
covalence-types = { path = "../../lib/types" }
# Optional HOL backend (`hol` feature): lowers the parsed Haskell subset into
# the carved `sexpr` kernel datatype from `covalence-init`. The DEFAULT build
# stays kernel-agnostic and zero-dep — these deps are pulled in only under
# `hol`. covalence-hol-eval supplies the designated literal build facade
# (`mk_blob`; see the toHOL purge ratchet) — atom payloads never touch the
# deprecated kernel literal constructors directly.
covalence-init = { path = "../../kernel/hol/init", optional = true }
covalence-hol-eval = { path = "../../kernel/hol/eval", optional = true }

[features]
# The HOL backend: `HolLower` lowers Haskell to a carved `sexpr` kernel `Term`.
hol = ["dep:covalence-init", "dep:covalence-hol-eval"]
