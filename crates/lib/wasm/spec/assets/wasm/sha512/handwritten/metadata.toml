# SHA-512 — per-variant metadata for the resource-shape build.
#
# v0 build.rs does not yet parse this file (per-variant overrides are a
# future extension); it serves as documentation and triggers rebuilds
# when changed.

[[spec_doc]]
title = "FIPS PUB 180-4"
url = "https://nvlpubs.nist.gov/nistpubs/FIPS/NIST.FIPS.180-4.pdf"

[hash]
output_bits = 512
block_bits = 1024
state_bits = 512
length_extendable = true
keyed = false
xof = false
modes = ["hash"]
