[package]
name = "covalence-wasm-build-guest"
version = "0.0.0"
edition = "2024"
publish = false
description = "Tiny wasm32 guest exposing covalence-wasm's ModuleBuilder via a C ABI — used to prove WASM-builds-WASM end-to-end in the JS runtime."

[lib]
crate-type = ["cdylib"]

[dependencies]
covalence-wasm = { path = "../core" }
