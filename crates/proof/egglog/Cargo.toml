[package]
name = "covalence-egglog"
version = "0.0.0"
edition = "2024"

[dependencies]
covalence-sexp = { path = "../../lib/sexp" }
covalence-types = { path = "../../lib/types" }
thiserror = "2"
# egglog support DISABLED for now — released egglog still lacks the `proof`
# module the bridge needs, and the git-rev workaround breaks Claude Web. See
# SKELETONS.md. Re-enable by uncommenting this dep, the feature below, the
# `[patch.crates-io]` block in the root Cargo.toml, and `pub mod external` in
# src/lib.rs.
# egglog = { version = "2", optional = true }

[features]
default = []
# Run real egglog `(prove …)` queries and convert the proof DAG into our local
# types. DISABLED for now (see the dep comment above).
# external-egglog = ["dep:egglog"]
