[package]
name = "covalence-web-kernel"
version = "0.0.0"
edition = "2024"

# The browser front-end for the kernel: a wasm-bindgen `cdylib` over
# `covalence-kernel::service::KernelService`. JS stays an executor — all
# proof-checking logic is this Rust crate compiled to `wasm32-unknown-unknown`.
# See `notes/vibes/web-kernel.md`.

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
covalence-kernel = { path = "../core", features = ["serde"] }
# The Haskell dialect front end — powers the live browser playground on the
# /haskell and /proofs pages.
#   * `hol`       — realize the S-expression IR into carved (untyped) kernel
#                   `Term`s (the /haskell "kernel Term" view).
#   * `hol-typed` — the trait-backed typed backend (`covalence-hol-api`): lower
#                   ANNOTATED dialect input to well-typed HOL `Term`s and link
#                   dialect theorems against S-expr proofs through the kernel
#                   (the typed-term view + the /proofs checker). `NativeHol`
#                   pulls in `covalence-init`/`-core`, already in the wasm via
#                   `covalence-kernel`, so this adds no new TCB.
covalence-haskell = { path = "../../lang/haskell", features = ["hol", "hol-typed"] }
# The trait-backed HOL surface — the concrete `NativeHol` backend (and the
# `Hol` / `Nat` traits) that `haskell_to_typed_hol` / `check_haskell_proofs`
# pick as `H`. Already in the wasm via `covalence-kernel` → `covalence-init`, so
# this adds no new code to the TCB; it just names the backend the typed dialect
# lowers against.
covalence-hol-api = { path = "../hol/api" }
serde_json = "1"
# The bindgen schema is version-locked: the crate and `wasm-bindgen-cli` must
# match exactly. We do NOT exact-pin here — Cargo.lock is the single source of
# truth, and both the local build (scripts/wasm-bindgen.mjs) and CI install the
# CLI version read from the lock. Bump via `cargo update -p wasm-bindgen`.
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
