[package]
name = "covalence-init"
version = "0.0.0"
edition = "2024"

# The semi-trusted covalence API: the `defs`/`init` theory catalogue, proof
# machinery, the `.cov` script surface, the Metamath/Peano metalogic. Built on
# the thin `covalence-hol` surface (which it re-exports). See
# `notes/vibes/init-hol-split.md`.

[features]
default = []

[dependencies]
covalence-hol = { path = "../traits" }
covalence-core = { path = "../core" }
covalence-hol-eval = { path = "../eval" }
covalence-types = { path = "../../../lib/types" }
covalence-hash = { path = "../../../lib/hash", default-features = false }
covalence-sexp = { path = "../../../lib/sexp" }
covalence-metamath = { path = "../../../proof/metamath" }
covalence-grammar = { path = "../../../lang/grammar" }
covalence-inductive = { path = "../../../lang/inductive" }
covalence-spectec = { path = "../../../lib/wasm/spectec" }
covalence-k = { path = "../../../lang/k" }
async-trait = "0.1"
bytes = "1"
fnv = "1"
futures = "0.3"
imbl = "5"
indexmap = "2"
smol_str = "0.3"
thiserror = "2"

# The async proof core runs on tokio; `run` blocks on it via a current-thread
# runtime. Native only (the kernel/TCB stays sync) — see `script::block_on`.
# On `wasm32-unknown-unknown` tokio does not build, so `block_on` falls back to
# `futures::executor::block_on` (futures is already a dependency above).
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", features = ["rt"] }

# `covalence-hash` → `covalence-rand` → `rand` → `getrandom`. On
# `wasm32-unknown-unknown` getrandom needs its `wasm_js` backend enabled
# explicitly (the feature alone suffices on getrandom 0.4 — no rustflag); native
# targets pick their backend automatically and are unaffected.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.4", features = ["wasm_js"] }
