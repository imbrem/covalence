[package]
name = "covalence-haskell"
version = "0.0.0"
edition = "2024"

# A kernel-agnostic surface crate: a hand-written recursive-descent parser for
# a small Haskell EXPRESSION dialect plus top-level function definitions, ONE
# canonical lowering of that AST into an S-expression interchange IR (with a
# text parser + canonical printer so third parties produce/consume
# S-expressions, never Haskell syntax), and a PLUGGABLE `Realize` trait through
# which a backend interprets the IR into its own target — the pipeline is
# Haskell dialect => S-expressions => backend. A backend overrides only the
# subset it realizes (e.g. a different numeric-literal strategy), so this
# on-ramp can grow toward writing `init/` in a Haskell dialect without
# committing to one backend. Nat literals are the covalence
# arbitrary-precision `Nat` (covalence-types, kernel-independent), never a
# machine integer; the parsers are hand-rolled.
#
# Deferred work: source-local TODO markers.

[dependencies]
# The covalence arbitrary-precision `Nat` (the type of Haskell nat literals
# and S-expression nat atoms). Kernel-independent: wraps num-bigint only.
covalence-types = { path = "../../lib/types" }
# Optional HOL backend (`hol` feature): realizes the S-expression IR into the
# carved `sexpr` kernel datatype from `covalence-init`. The DEFAULT build
# stays kernel-agnostic — these deps are pulled in only under `hol`.
# covalence-hol-eval supplies the designated literal build facade
# (`mk_blob`; see the toHOL purge ratchet) — atom payloads never touch the
# deprecated kernel literal constructors directly.
covalence-init = { path = "../../kernel/hol/init", optional = true }
covalence-hol-eval = { path = "../../kernel/hol/eval", optional = true }
# The high-level trait-backed HOL surface (`hol-typed` feature). The typed
# backend builds REAL HOL `Term`s exclusively through the `Hol` / `Nat` traits,
# so swapping the TCB is a matter of swapping the trait impl, not touching the
# dialect or its lowering. Only this crate is named; no `TermKind`.
covalence-hol-api = { path = "../../kernel/hol/api", optional = true }

[features]
# The untyped HOL backend: `HolBackend` realizes the IR as carved (untyped)
# `sexpr` kernel `Term`s.
hol = ["dep:covalence-init", "dep:covalence-hol-eval"]
# The TYPED HOL backend: `typed` lowers annotated dialect definitions into
# well-typed HOL `Term`s through the `covalence-hol-api` traits (`Hol` + `Nat`).
hol-typed = ["dep:covalence-hol-api"]
