[package]
name = "covalence-wasm"
version = "0.0.0"
edition = "2024"

[features]
runtime = ["dep:wasmtime"]

[dependencies]
thiserror = "2"
wasm-encoder = "0.249"
wat = "1.249"
wasmprinter = "0.249"
wasmparser = "0.249"
# runtime-only deps
wasmtime = { version = "44", features = ["component-model", "gc"], optional = true }
