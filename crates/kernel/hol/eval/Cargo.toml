[package]
name = "covalence-hol-eval"
version = "0.0.0"
edition = "2024"

# The EVAL TIER: owns `CoreEval` (the language extending `CoreLang` with the
# computation-backed certificate/toHOL rules) and hosts the moved `defs/`
# term-op catalogue next to those rules' dispatch tables. NOT zero-TCB any
# more: trust is per-rule via `admits` (golden: docs/deps/eval-manifest.txt);
# everything else (the reduction drivers, the catalogue-as-data) stays
# untrusted — it can fail, but it cannot forge. This crate must NEVER be
# depended on by the kernel (core -> hol-eval is a BANNED edge in
# scripts/dep-graph.mjs; hol-eval -> core is the direction we keep) and never
# NORMALLY depends on the `covalence-init` catalogue (also BANNED). The
# dev-dependency on covalence-init is the differential-test pattern (the
# covalence-pure-eval -> covalence-core precedent): dev/build deps are not
# dep-graph edges, and the pure-HOL unit tests (tests/pure_hol_units.rs)
# consume init's *proved* defining theorems to check the cert families
# against the catalogue definitions.

[dependencies]
covalence-core = { path = "../core" }
covalence-pure = { path = "../../base" }
covalence-pure-eval = { path = "../../base/eval" }
covalence-sexp = { path = "../../../lib/sexp" }
covalence-types = { path = "../../../lib/types" }
smol_str = "0.3"
thiserror = "2"

[dev-dependencies]
covalence-init = { path = "../init" }
