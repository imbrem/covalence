[package]
name = "covalence-client"
version = "0.0.0"
edition = "2024"

[features]
default = ["sync", "async"]
sync = ["dep:ureq"]
async = [
    "dep:hyper",
    "dep:hyper-util",
    "dep:http-body-util",
    "dep:tokio",
    "dep:async-trait",
    "dep:bytes",
]

[dependencies]
covalence-shell = { path = "../../kernel/shell" }
covalence-hash = { path = "../../lib/hash", default-features = false }
covalence-store = { path = "../../store/core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# sync feature
ureq = { version = "3", optional = true }

# async feature
hyper = { version = "1", features = ["client", "http1"], optional = true }
hyper-util = { version = "0.1", features = ["client-legacy", "tokio", "http1"], optional = true }
http-body-util = { version = "0.1", optional = true }
tokio = { version = "1", features = ["net"], optional = true }
async-trait = { version = "0.1", optional = true }
bytes = { version = "1", optional = true }

[dev-dependencies]
axum = "0.8"
bytes = "1"
covalence-serve = { path = "../core", default-features = false }
covalence-shell = { path = "../../kernel/shell" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
