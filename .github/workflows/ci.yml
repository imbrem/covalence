name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    name: Cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  test:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # covalence-wasm's guest integration tests shell out to
          # `cargo build -p covalence-core-test-guest --target wasm32-unknown-unknown`,
          # so the target must be installed for the test job too.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all

  build-native:
    name: Build native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p covalence

  deps:
    name: Dependency graph + TCB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
      # Fails if notes/deps/ (the tracked graph + TCB closure) is stale.
      # Regenerate locally with `bun run deps`.
      - run: bun run deps:check

  build-wasm:
    name: Build WASM + VSCode extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:wasm

  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `bun run build:web` runs `build:web-kernel`, which compiles
      # covalence-web-kernel to wasm32-unknown-unknown and post-processes it with
      # wasm-bindgen + wasm-opt — so the web job needs the wasm target and both
      # tools, not just bun.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          # wasm-bindgen-cli is pinned to the wasm-bindgen version in Cargo.lock;
          # binaryen provides wasm-opt.
          tool: wasm-bindgen-cli@0.2.121,binaryen
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:web

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up virtualenv and install tools
        run: |
          python -m venv crates/covalence-python/.venv
          source crates/covalence-python/.venv/bin/activate
          pip install maturin pytest
      - name: Build and test Python bindings
        run: |
          cd crates/covalence-python
          source .venv/bin/activate
          maturin develop
          pytest tests/ -v
