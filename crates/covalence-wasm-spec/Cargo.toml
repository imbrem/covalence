[package]
name = "covalence-wasm-spec"
version = "0.0.0"
edition = "2024"
license = "Apache-2.0 OR MIT"
description = "Reference WASM components naming mathematical functions by content-addressed hash."

[features]
default = ["bytes"]
# Embed the .wasm/.wat/.wit asset bytes in the binary.
bytes = []
# Gates the clang invocation for `.c`-sourced variants in the rebuild
# binary. Off by default so the standard rebuild path (regenerating WAT
# variants) needs no C toolchain.
rebuild-c = []

[dependencies]
covalence-wasm = { path = "../covalence-wasm" }
covalence-hash = { path = "../covalence-hash", features = ["sha1", "sha512"] }
covalence-types = { path = "../covalence-types" }
thiserror = "2"

[build-dependencies]
covalence-hash = { path = "../covalence-hash" }
toml = "0.8"

[dev-dependencies]
covalence-wasm = { path = "../covalence-wasm", features = ["runtime"] }
covalence-hash = { path = "../covalence-hash", features = ["sha1", "sha512"] }

[[bin]]
name = "rebuild"
path = "src/bin/rebuild.rs"
