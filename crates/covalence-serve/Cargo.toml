[package]
name = "covalence-serve"
version = "0.0.0"
edition = "2024"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
rust-embed = "8"
mime_guess = "2"
tower-http = { version = "0.6", features = ["cors", "trace"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
open = "5"
eyre = "0.6"
tracing = "0.1"
covalence-git = { path = "../covalence-git" }
