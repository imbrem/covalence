[package]
name = "covalence-hash"
version = "0.0.0"
edition = "2024"

[features]
default = ["git"]
git = ["dep:gix-hash"]
sha1 = ["dep:sha1"]
sha512 = []

[dependencies]
blake3 = "1"
gix-hash = { version = "0.25", features = ["sha1", "sha256"], optional = true }
covalence-rand = { path = "../rand" }
sha2 = "0.10"
sha1 = { version = "0.10", optional = true }
