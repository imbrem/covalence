[package]
name = "covalence-types"
version = "0.0.0"
edition = "2024"

[features]
default = ["int"]
int = ["dep:num-bigint", "dep:num-traits", "dep:num-integer"]

[dependencies]
bytes = "1"
thiserror = "2"
num-bigint = { version = "0.4", optional = true }
num-traits = { version = "0.2", optional = true }
num-integer = { version = "0.1", optional = true }
