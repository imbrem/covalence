# The covalence-ui suite is vitest-style (uses jsdom + the Svelte compiler).
# Bun's runner can't compile .svelte files, so we delegate to vitest via
# tests/ui.test.ts (same shell-out pattern as cargo / pytest wrappers).
#
# covalence-wasm-js is also vitest-style — its jco-transpiled component
# loader uses long `data:text/javascript;base64,…` URLs that exceed Bun's
# module-resolver path length. Delegate to vitest via tests/wasm-js.test.ts.
#
# covalence-web is also vitest-style — its Svelte component tests need jsdom +
# the Svelte compiler. Delegate to vitest via tests/web.test.ts.
#
# e2e/ holds Playwright specs, run by the Playwright runner via
# `bun run test:e2e` — Bun's runner must not try to execute them.
[test]
pathIgnorePatterns = [
  "**/packages/covalence-ui/**",
  "**/packages/covalence-wasm-js/**",
  "**/apps/covalence-web/**",
  "**/e2e/**",
]
