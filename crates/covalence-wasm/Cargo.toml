[package]
name = "covalence-wasm"
version = "0.0.0"
edition = "2024"

[features]
runtime = ["dep:wasmtime", "dep:covalence-core"]

[dependencies]
covalence-core = { path = "../covalence-core", optional = true }
thiserror = "2"
wasm-encoder = "0.251"
wat = "1.251"
wasmprinter = "0.251"
wasmparser = "0.251"
# Component encoding: kept in lockstep with the wasm-encoder/wat/wasmprinter/wasmparser
# family — they share the same monorepo cadence.
wit-component = "0.251"
wit-parser = "0.251"
# runtime-only deps
wasmtime = { version = "45", features = ["component-model", "gc"], optional = true }
