[package]
name = "covalence"
version = "0.0.0"
edition = "2024"

[[bin]]
name = "cov"
path = "src/main.rs"

[features]
default = ["lsp", "cogit", "serve", "repl", "hol", "data"]
lsp = ["dep:covalence-lsp"]
cogit = ["dep:covalence-git"]
serve = []
repl = ["dep:rustyline"]
hol = ["dep:covalence-hol", "dep:covalence-opentheory"]
data = ["covalence-repl/arrow", "covalence-repl/parquet"]

[dependencies]
covalence-lsp = { path = "../covalence-lsp", optional = true }
covalence-git = { path = "../covalence-git", optional = true, features = ["clone"] }
# Default features (server discovery, XDG paths) need `dirs` / `nix` and only
# build off-WASM. The `git` module — which `cog clone` uses for repo
# discovery — has no extra deps and is always available.
covalence-proto = { path = "../covalence-proto", default-features = false }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
covalence-serve = { path = "../covalence-serve" }
covalence-repl = { path = "../covalence-repl", features = ["fetch", "cogit"] }
covalence-shell = { path = "../covalence-shell" }
covalence-store = { path = "../covalence-store", features = ["sqlite"] }
covalence-hol = { path = "../covalence-hol", optional = true }
covalence-opentheory = { path = "../covalence-opentheory", optional = true }
covalence-wasm = { path = "../covalence-wasm", default-features = false }
covalence-client = { path = "../covalence-client", features = ["sync"] }
covalence-proto = { path = "../covalence-proto", features = ["discovery", "config"] }
covalence-object = { path = "../covalence-object" }
covalence-hash = { path = "../covalence-hash" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }

[target.'cfg(target_os = "linux")'.dependencies]
covalence-fuse = { path = "../covalence-fuse" }
color-eyre = "0.6"
eyre = "0.6"
rustyline = { version = "18", optional = true }
memchr = "2"

[dev-dependencies]
tempfile = "3"
covalence-hash = { path = "../covalence-hash" }
serde_json = "1"
wat = "1"
