[package]
name = "covalence-wasm-spec-fuzz"
version = "0.0.0"
edition = "2024"
publish = false

# cargo-fuzz workspace fragment. Each binary target under
# `fuzz_targets/` is a libFuzzer harness; run with
# `cargo +nightly fuzz run <name> -- -max_total_time=60` from the
# crate root (`crates/lib/wasm/spec/`).

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }
covalence-wasm-spec = { path = ".." }
covalence-wasm = { path = "../../core", features = ["runtime"] }
covalence-hash = { path = "../../../hash", features = ["sha1"] }

[[bin]]
name = "sha1_resource_differential"
path = "fuzz_targets/sha1_resource_differential.rs"
test = false
doc = false
bench = false

[[bin]]
name = "sha1_stateful_differential"
path = "fuzz_targets/sha1_stateful_differential.rs"
test = false
doc = false
bench = false
