[package]
name = "covalence-store"
version = "0.0.0"
edition = "2024"

[dependencies]
async-trait = { version = "0.1", optional = true }
bytes = { version = "1", optional = true }
covalence-hash = { path = "../lib/hash", default-features = false }
covalence-json = { path = "../lib/json", optional = true }
covalence-sqlite = { path = "../lib/sqlite", optional = true }
indexmap = { version = "2", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
thiserror = "2"
tokio = { version = "1", features = ["rt"], optional = true }

[features]
default = ["memory", "async"]
memory = ["dep:indexmap"]
sqlite = ["dep:covalence-sqlite"]
# Async content-addressed store trait + adapters. Trait surface is
# runtime-agnostic; compiles to wasm32-wasip1-threads.
async = ["dep:async-trait", "dep:bytes"]
# Sync façade over the async trait via tokio runtime Handle. Native only.
blocking = ["async", "dep:tokio"]
# JSON-shaped store-self-description manifest (see `metadata` module).
metadata = ["dep:covalence-json", "dep:serde"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
