[package]
name = "covalence-lisp"
version = "0.0.0"
edition = "2024"

# The /lisp demo surface. A CLEAR Lisp (the `Lisp` trait: dictionary →
# numeral → symbol atom resolution, Forth-style), a reader over
# `covalence_sexp`, a direct lowering of S-expressions into carved kernel
# `sexpr` terms, and a `SymbolicStrategy` (a `covalence_repl::ReductionStrategy`)
# that proves reductions like `⊢ (car (cons a b)) = a` by COMPOSING the
# carved carrier's computation laws — no new trusted kernel rules.
#
# The DEFAULT build is kernel-agnostic (trait + reader only). The `hol`
# feature pulls the kernel (covalence-init / covalence-hol-eval /
# covalence-hol-api) and enables the lowering + symbolic strategy.
#
# Deferred work: source-local TODO markers.

[dependencies]
# Reader / S-expression IR (kernel-independent).
covalence-sexp = { path = "../../lib/sexp" }
covalence-sexpr-api = { path = "../sexpr-api" }
# The generic REPL + ReductionStrategy seam (kernel-independent).
covalence-repl-core = { path = "../../lib/repl-core" }
covalence-hash = { path = "../../lib/hash", optional = true, default-features = false }
thiserror = "2"

# Optional HOL backend (`hol` feature): lowers S-expressions into the carved
# `sexpr` kernel datatype and proves reductions by composing its computation
# laws. covalence-hol-eval supplies the designated literal build facade
# (`mk_blob`) — atom payloads never touch the deprecated kernel literal
# constructors directly. The DEFAULT build stays kernel-agnostic.
covalence-init = { path = "../../kernel/hol/init", optional = true }
covalence-hol-eval = { path = "../../kernel/hol/eval", optional = true }
covalence-hol-api = { path = "../../kernel/hol/api", optional = true }
# The kernel term/`TermKind` (for decoding atom blob payloads back to text
# when printing a value read off a theorem conclusion).
covalence-core = { path = "../../kernel/hol/core", optional = true }
# The `Int` numeral type (the `sector+int` dialect's integer-literal backend
# builds `mk_int`-shaped `int` literals from `covalence_types::Int`).
covalence-types = { path = "../../lib/types", optional = true }

[features]
# The HOL backend: lowering (SExpr -> carved `sexpr` `Term`) + the symbolic
# reduction strategy over the carved carrier's proved computation laws + the
# multi-step evaluator and the `Session` REPL.
hol = [
    "dep:covalence-hash",
    "dep:covalence-init",
    "dep:covalence-hol-eval",
    "dep:covalence-hol-api",
    "dep:covalence-core",
    "dep:covalence-types",
]

[[example]]
name = "acl2_perf_bench"
required-features = ["hol"]
